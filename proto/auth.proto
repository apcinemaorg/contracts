syntax = "proto3";

package auth.v1;

service AuthService {
    rpc SendOtp (SendOtpRequest) returns (SendOtpResponse);
    rpc VerifyOtp (VerifyOtpRequest) returns (VerifyOtpResponse);
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc Refresh (RefreshRequest) returns (RefreshResponse);
    rpc Logout (LogoutRequest) returns (LogoutResponse);
    rpc GetMe (GetMeRequest) returns (GetMeResponse);
}

message SendOtpRequest {
    string identifier = 1;
    string type = 2;
}

message SendOtpResponse {
    bool ok = 1;
}

message VerifyOtpRequest {
    string identifier = 1;
    string type = 2;
    string code = 3;
}

message VerifyOtpResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message RegisterRequest {
    string identifier = 1;
    string password = 2;
    optional string username = 3;
    optional string first_name = 4;
    optional string last_name = 5;
    string type = 6;
}

message RegisterResponse {
    bool ok = 1;
    string access_token = 2;
    string refresh_token = 3;
    string error_message = 4;
}

message LoginRequest {
    string identifier = 1;
    string password = 2;
    string type = 3;
}

message LoginResponse {
    bool ok = 1;
    string access_token = 2;
    string refresh_token = 3;
    string error_message = 4;
}

message RefreshRequest {
    string refresh_token = 1;
}

message RefreshResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LogoutRequest {
    string account_id = 1;
}

message LogoutResponse {
    bool ok = 1;
}

message GetMeRequest {
    string account_id = 1;
}

message GetMeResponse {
    string id = 1;
    optional string phone = 2;
    optional string email = 3;
    optional string username = 4;
    optional string first_name = 5;
    optional string last_name = 6;
    bool is_phone_verified = 7;
    bool is_email_verified = 8;
}

service AccountService {
    rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
    rpc SendChangeIdentifierOtp (SendChangeIdentifierOtpRequest) returns (SendChangeIdentifierOtpResponse);
    rpc VerifyChangeIdentifier (VerifyChangeIdentifierRequest) returns (VerifyChangeIdentifierResponse);
}

message ChangePasswordRequest {
    string account_id = 1;
    string current_password = 2;
    string new_password = 3;
}

message ChangePasswordResponse {
    bool ok = 1;
    string error_message = 2;
    string access_token = 3;
    string refresh_token = 4;
}

message SendChangeIdentifierOtpRequest {
    string account_id = 1;
    string new_identifier = 2;
    string type = 3;
}

message SendChangeIdentifierOtpResponse {
    bool ok = 1;
    string error_message = 2;
}

message VerifyChangeIdentifierRequest {
    string account_id = 1;
    string new_identifier = 2;
    string type = 3;
    string code = 4;
}

message VerifyChangeIdentifierResponse {
    bool ok = 1;
    string error_message = 2;
}